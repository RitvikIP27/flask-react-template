server {
    listen 80;
    server_name _;

    # Serve React frontend
    root /var/www/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Reverse proxy to backend
    location /api/ {
        proxy_pass http://unix:/tmp/app.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}